---
name: Bug Report
description: Report a bug or unexpected behavior in Link Smartly
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below so we can investigate.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps to reproduce the behavior.
      placeholder: |
        1. Go to Link Smartly settings
        2. Add a keyword mapping
        3. View a post with that keyword
        4. See the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: input
    id: wp-version
    attributes:
      label: WordPress version
      placeholder: "6.7"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "8.2"
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Link Smartly version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Additional environment info
      description: Theme, other active plugins, hosting provider, caching plugin, etc.
      placeholder: |
        Theme: Astra 4.x
        Caching: LiteSpeed Cache
        Other SEO plugins: Rank Math

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this bug has not been reported before.
          required: true
        - label: I have tested with only Link Smartly active (or noted conflicting plugins above).
